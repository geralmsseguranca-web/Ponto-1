<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Online | Login + Abas (Admin/Colaborador)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #eef2fa 0%, #d9e2ef 100%); min-height: 100vh; padding: 2rem 1rem; }
        .container { max-width: 1300px; margin: 0 auto; }
        /* Login */
        .login-box { background: white; border-radius: 2rem; max-width: 500px; margin: 5rem auto; padding: 2rem; box-shadow: 0 20px 35px rgba(0,0,0,0.1); }
        .login-box h2 { margin-bottom: 1.5rem; text-align: center; color: #0a2b3e; }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; border-radius: 60px; border: 1.5px solid #cbdde9; }
        button { background: #2c7da0; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; cursor: pointer; }
        .error { color: #b33b2c; margin-top: 1rem; text-align: center; }
        /* Abas */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; color: #1e4663; padding: 10px 24px; border-radius: 60px; width: auto; }
        .tab-btn.active { background: #0a2b3e; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        /* Cards */
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-entrada { background: #2b9348; }
        .btn-saida { background: #e85d04; }
        .btn-danger { background: #bc4e2c; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; width: auto; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .lista { max-height: 400px; overflow-y: auto; margin-top: 1rem; }
        .item { padding: 10px; border-bottom: 1px solid #eef2f8; }
        .badge { padding: 2px 10px; border-radius: 40px; font-size: 0.75rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; }
        .logout-btn { background: #64748b; margin-top: 1rem; padding: 8px; font-size: 0.8rem; }
        @media (max-width: 700px) { .tab-btn { flex: 1; text-align: center; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Tela de login -->
    <div id="loginScreen">
        <div class="login-box">
            <h2><i class="fas fa-clock"></i> Controle de Ponto</h2>
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="E-mail">
            </div>
            <div class="input-group">
                <input type="password" id="loginSenha" placeholder="Senha">
            </div>
            <button id="btnLogin"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <!-- Sistema logado -->
    <div id="systemScreen" style="display: none;">
        <div class="card" style="background: #0a2b3e; color: white; margin-bottom: 1rem;">
            <div class="flex-between">
                <div><i class="fas fa-user-circle"></i> <span id="userName"></span> (<span id="userRole"></span>)</div>
                <button id="btnLogout" class="logout-btn" style="background:#e2e8f0; color:#1e4663;"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>

        <!-- Abas -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="pontoTab"><i class="fas fa-fingerprint"></i> Registrar Ponto</button>
            <button class="tab-btn" data-tab="adminTab" id="adminTabBtn" style="display: none;"><i class="fas fa-users-cog"></i> Administração</button>
        </div>

        <!-- Aba Registrar Ponto -->
        <div id="pontoTab" class="tab-pane active">
            <div class="card">
                <h3><i class="fas fa-user-check"></i> Selecione o colaborador</h3>
                <select id="selectColaborador" class="form-control" style="width:100%; margin-top: 10px;"></select>
                <div id="postoPreview" style="margin-top: 10px; padding: 8px; background:#f0f6fe; border-radius: 40px;"><i class="fas fa-tag"></i> Posto: <span id="postoSelecionado">—</span></div>
                <div style="display: flex; gap: 1rem; margin: 20px 0;">
                    <button id="btnEntrada" class="btn-entrada" style="flex:1;"><i class="fas fa-sign-in-alt"></i> ENTRADA</button>
                    <button id="btnSaida" class="btn-saida" style="flex:1;"><i class="fas fa-sign-out-alt"></i> SAÍDA</button>
                </div>
            </div>
            <div class="card">
                <h3><i class="fas fa-history"></i> Histórico de registros</h3>
                <div id="historicoList" class="lista">Carregando...</div>
            </div>
        </div>

        <!-- Aba Administração (só admin) -->
        <div id="adminTab" class="tab-pane">
            <div class="card">
                <h3><i class="fas fa-user-plus"></i> Novo Colaborador</h3>
                <input type="text" id="novoNome" placeholder="Nome completo" style="width:100%; margin-top: 5px;">
                <input type="text" id="novoPosto" placeholder="Posto de serviço" style="width:100%; margin: 10px 0;">
                <input type="email" id="novoEmail" placeholder="E-mail para login" style="width:100%;">
                <input type="password" id="novaSenha" placeholder="Senha inicial" style="width:100%; margin: 10px 0;">
                <button id="btnCriarColaborador"><i class="fas fa-save"></i> Criar colaborador</button>
            </div>
            <div class="card">
                <h3><i class="fas fa-users"></i> Colaboradores cadastrados</h3>
                <div id="listaColaboradores" class="lista">Carregando...</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Configuração Firebase (substitua pelos seus dados)
    const firebaseConfig = {
        apiKey: "AIzaSyAind6SC1AyJLhN5G456VrvNDBTIt2bLWs",
        authDomain: "ponto-1-e1ef4.firebaseapp.com",
        projectId: "ponto-1-e1ef4",
        storageBucket: "ponto-1-e1ef4.firebasestorage.app",
        messagingSenderId: "143094232583",
        appId: "1:143094232583:web:5636e6e0b21b9989151ca2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Elementos
    const loginScreen = document.getElementById('loginScreen');
    const systemScreen = document.getElementById('systemScreen');
    const loginEmail = document.getElementById('loginEmail');
    const loginSenha = document.getElementById('loginSenha');
    const btnLogin = document.getElementById('btnLogin');
    const loginError = document.getElementById('loginError');
    const btnLogout = document.getElementById('btnLogout');
    const userNameSpan = document.getElementById('userName');
    const userRoleSpan = document.getElementById('userRole');
    const adminTabBtn = document.getElementById('adminTabBtn');
    const selectColaborador = document.getElementById('selectColaborador');
    const postoSelecionadoSpan = document.getElementById('postoSelecionado');
    const btnEntrada = document.getElementById('btnEntrada');
    const btnSaida = document.getElementById('btnSaida');
    const historicoList = document.getElementById('historicoList');
    const listaColaboradoresDiv = document.getElementById('listaColaboradores');
    const btnCriarColaborador = document.getElementById('btnCriarColaborador');
    const novoNome = document.getElementById('novoNome');
    const novoPosto = document.getElementById('novoPosto');
    const novoEmail = document.getElementById('novoEmail');
    const novaSenha = document.getElementById('novaSenha');

    let currentUser = null; // { uid, email, role, nome, posto }
    let colaboradoresMap = new Map(); // id -> { nome, posto, email, role }
    let selectedColabId = null;

    function showToast(msg, isError = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#b91c1c' : '#1f6392';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Criar admin padrão se não existir (somente uma vez)
    async function criarAdminPadrao() {
        const adminEmail = "admin@admin.com";
        const adminSenha = "admin123";
        try {
            const userCred = await createUserWithEmailAndPassword(auth, adminEmail, adminSenha);
            const userId = userCred.user.uid;
            // Verifica se já existe documento na coleção usuarios
            const q = query(collection(db, "usuarios"), where("email", "==", adminEmail));
            const snap = await getDocs(q);
            if (snap.empty) {
                await addDoc(collection(db, "usuarios"), {
                    uid: userId,
                    email: adminEmail,
                    role: "admin",
                    nome: "Administrador",
                    posto: "Gestor"
                });
                console.log("Admin padrão criado.");
            }
        } catch (err) {
            if (err.code !== 'auth/email-already-exists') console.error(err);
        }
    }

    // Carregar dados do usuário logado (via Firestore)
    async function carregarDadosUsuario(uid, email) {
        const q = query(collection(db, "usuarios"), where("uid", "==", uid));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const doc = snap.docs[0];
            const data = doc.data();
            return { ...data, id: doc.id };
        } else {
            // Se não encontrou, cria como colaborador (fallback)
            return { role: "colaborador", nome: email.split('@')[0], posto: "Não definido" };
        }
    }

    // Carregar lista de colaboradores (para select e admin)
    function carregarColaboradores() {
        const q = query(collection(db, "usuarios"), orderBy("nome"));
        return onSnapshot(q, (snapshot) => {
            colaboradoresMap.clear();
            let options = '<option value="">-- Selecione um colaborador --</option>';
            let listaAdminHtml = '';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const id = docSnap.id;
                const nome = data.nome || "Sem nome";
                const posto = data.posto || "";
                const email = data.email || "";
                const role = data.role || "colaborador";
                colaboradoresMap.set(id, { nome, posto, email, role, id });
                options += `<option value="${id}">${nome} (${posto})</option>`;
                if (currentUser && currentUser.role === 'admin') {
                    listaAdminHtml += `
                        <div class="item flex-between">
                            <div><strong>${nome}</strong> - ${posto}<br><small>${email}</small><br><span class="badge" style="background:#e2e8f0;">${role}</span></div>
                            <button class="btn-danger btn-sm" data-id="${id}" data-nome="${nome}"><i class="fas fa-trash"></i> Excluir</button>
                        </div>
                    `;
                }
            });
            selectColaborador.innerHTML = options;
            if (listaColaboradoresDiv) listaColaboradoresDiv.innerHTML = listaAdminHtml || '<div class="item">Nenhum colaborador cadastrado.</div>';
            // Eventos de exclusão (admin)
            document.querySelectorAll('[data-id]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const colabId = btn.getAttribute('data-id');
                    const nome = btn.getAttribute('data-nome');
                    if (confirm(`Excluir "${nome}" e todos os seus registros de ponto?`)) {
                        await excluirColaboradorComPontos(colabId);
                    }
                });
            });
            // Restaura seleção se possível
            if (selectedColabId && colaboradoresMap.has(selectedColabId)) {
                selectColaborador.value = selectedColabId;
                const c = colaboradoresMap.get(selectedColabId);
                postoSelecionadoSpan.innerText = c.posto;
            } else {
                selectColaborador.value = "";
                postoSelecionadoSpan.innerText = '—';
                selectedColabId = null;
            }
        }, err => console.error(err));
    }

    async function excluirColaboradorComPontos(colabId) {
        try {
            const colab = colaboradoresMap.get(colabId);
            if (!colab) return;
            // Excluir pontos do usuário
            const pontosRef = collection(db, "pontos");
            const qPontos = query(pontosRef, where("userId", "==", colab.uid || colabId));
            const snap = await getDocs(qPontos);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(doc(db, "pontos", d.id)));
            // Excluir documento usuario
            batch.delete(doc(db, "usuarios", colabId));
            await batch.commit();
            showToast(`Colaborador ${colab.nome} removido com sucesso.`);
            if (selectedColabId === colabId) selectedColabId = null;
        } catch (err) {
            showToast("Erro: " + err.message, true);
        }
    }

    // Histórico (filtrado por admin ou colaborador)
    function carregarHistorico() {
        let q;
        if (currentUser.role === 'admin') {
            q = query(collection(db, "pontos"), orderBy("timestamp", "desc"), limit(100));
        } else {
            // Colaborador vê apenas seus pontos
            q = query(collection(db, "pontos"), where("userId", "==", currentUser.uid), orderBy("timestamp", "desc"), limit(100));
        }
        return onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                historicoList.innerHTML = '<div class="item">Nenhum registro de ponto.</div>';
                return;
            }
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const nome = data.employeeName || "Desconhecido";
                const posto = data.employeePosto || "";
                const tipo = data.type;
                let ts = data.timestamp?.toDate() || new Date();
                const dataStr = ts.toLocaleString('pt-BR');
                html += `
                    <div class="item">
                        <div class="flex-between">
                            <span><strong>${nome}</strong> ${posto ? `(${posto})` : ''}</span>
                            <span class="badge" style="background:${tipo === 'Entrada' ? '#d9f0e3' : '#ffe1db'}">${tipo}</span>
                        </div>
                        <div><small>${dataStr}</small></div>
                    </div>
                `;
            });
            historicoList.innerHTML = html;
        }, err => console.error(err));
    }

    // Registrar ponto
    async function registrarPonto(tipo) {
        if (currentUser.role === 'colaborador') {
            // colaborador só pode registrar seu próprio ponto
            const nome = currentUser.nome;
            const posto = currentUser.posto;
            try {
                await addDoc(collection(db, "pontos"), {
                    userId: currentUser.uid,
                    employeeName: nome,
                    employeePosto: posto,
                    type: tipo,
                    timestamp: serverTimestamp()
                });
                showToast(`✅ Ponto de ${tipo} registrado para ${nome}`);
            } catch (err) {
                showToast("Erro: " + err.message, true);
            }
        } else if (currentUser.role === 'admin' && selectedColabId) {
            const colab = colaboradoresMap.get(selectedColabId);
            if (!colab) { showToast("Selecione um colaborador válido.", true); return; }
            try {
                await addDoc(collection(db, "pontos"), {
                    userId: colab.uid || selectedColabId,
                    employeeName: colab.nome,
                    employeePosto: colab.posto,
                    type: tipo,
                    timestamp: serverTimestamp()
                });
                showToast(`✅ Ponto de ${tipo} registrado para ${colab.nome}`);
            } catch (err) {
                showToast("Erro: " + err.message, true);
            }
        } else {
            showToast("Selecione um colaborador (admin) ou use seu próprio nome.", true);
        }
    }

    // Criar novo colaborador (admin)
    async function criarColaborador() {
        const nome = novoNome.value.trim();
        const posto = novoPosto.value.trim();
        const email = novoEmail.value.trim();
        const senha = novaSenha.value.trim();
        if (!nome || !posto || !email || !senha) {
            showToast("Preencha todos os campos.", true);
            return;
        }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, senha);
            const uid = userCred.user.uid;
            await addDoc(collection(db, "usuarios"), {
                uid: uid,
                email: email,
                role: "colaborador",
                nome: nome,
                posto: posto
            });
            showToast(`Colaborador ${nome} criado com sucesso!`);
            novoNome.value = ""; novoPosto.value = ""; novoEmail.value = ""; novaSenha.value = "";
        } catch (err) {
            showToast("Erro: " + err.message, true);
        }
    }

    // Alternar abas
    function configurarAbas(role) {
        const adminTab = document.getElementById('adminTab');
        if (role === 'admin') {
            adminTabBtn.style.display = 'flex';
        } else {
            adminTabBtn.style.display = 'none';
            if (adminTab) adminTab.classList.remove('active');
            document.querySelector('[data-tab="pontoTab"]').click();
        }
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }

    // Logout
    async function logout() {
        await signOut(auth);
        location.reload();
    }

    // Login
    btnLogin.onclick = async () => {
        const email = loginEmail.value;
        const senha = loginSenha.value;
        try {
            const userCred = await signInWithEmailAndPassword(auth, email, senha);
            const user = userCred.user;
            const userData = await carregarDadosUsuario(user.uid, user.email);
            currentUser = {
                uid: user.uid,
                email: user.email,
                role: userData.role || 'colaborador',
                nome: userData.nome || user.email.split('@')[0],
                posto: userData.posto || ''
            };
            userNameSpan.innerText = currentUser.nome;
            userRoleSpan.innerText = currentUser.role === 'admin' ? 'Administrador' : 'Colaborador';
            configurarAbas(currentUser.role);
            loginScreen.style.display = 'none';
            systemScreen.style.display = 'block';
            // Inicializa listeners
            carregarColaboradores();
            carregarHistorico();
            if (currentUser.role === 'admin') {
                selectColaborador.disabled = false;
                selectColaborador.onchange = (e) => {
                    selectedColabId = e.target.value;
                    if (selectedColabId && colaboradoresMap.has(selectedColabId)) {
                        postoSelecionadoSpan.innerText = colaboradoresMap.get(selectedColabId).posto;
                    } else postoSelecionadoSpan.innerText = '—';
                };
            } else {
                // Colaborador: esconde select e mostra apenas seu posto
                selectColaborador.style.display = 'none';
                document.getElementById('postoPreview').innerHTML = `<i class="fas fa-tag"></i> Seu posto: ${currentUser.posto}`;
                postoSelecionadoSpan.innerText = currentUser.posto;
            }
        } catch (err) {
            loginError.innerText = "E-mail ou senha inválidos.";
            console.error(err);
        }
    };

    btnLogout.onclick = logout;
    btnEntrada.onclick = () => registrarPonto('Entrada');
    btnSaida.onclick = () => registrarPonto('Saída');
    if (btnCriarColaborador) btnCriarColaborador.onclick = criarColaborador;

    // Verificar se já está logado
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userData = await carregarDadosUsuario(user.uid, user.email);
            currentUser = {
                uid: user.uid,
                email: user.email,
                role: userData.role || 'colaborador',
                nome: userData.nome || user.email.split('@')[0],
                posto: userData.posto || ''
            };
            userNameSpan.innerText = currentUser.nome;
            userRoleSpan.innerText = currentUser.role === 'admin' ? 'Administrador' : 'Colaborador';
            configurarAbas(currentUser.role);
            loginScreen.style.display = 'none';
            systemScreen.style.display = 'block';
            carregarColaboradores();
            carregarHistorico();
            if (currentUser.role === 'admin') {
                selectColaborador.disabled = false;
                selectColaborador.onchange = (e) => {
                    selectedColabId = e.target.value;
                    if (selectedColabId && colaboradoresMap.has(selectedColabId)) {
                        postoSelecionadoSpan.innerText = colaboradoresMap.get(selectedColabId).posto;
                    } else postoSelecionadoSpan.innerText = '—';
                };
            } else {
                selectColaborador.style.display = 'none';
                document.getElementById('postoPreview').innerHTML = `<i class="fas fa-tag"></i> Seu posto: ${currentUser.posto}`;
            }
        } else {
            loginScreen.style.display = 'block';
            systemScreen.style.display = 'none';
            await criarAdminPadrao(); // Garante admin inicial
        }
    });
</script>
</body>
</html>
